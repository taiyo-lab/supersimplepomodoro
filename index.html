<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Timer</title>
<meta name="description" content="A minimal pomodoro timer. Tap the dial to start or pause.">
<meta name="theme-color" content="#e9e9e7">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='42' fill='%23f4f4f2' stroke='%235b7ca4' stroke-width='10'/%3E%3Cpath d='M50 50 L50 8 A42 42 0 0 1 92 50 Z' fill='%23cdd8e4'/%3E%3C/svg%3E">
<script>
  (function () {
    const saved = localStorage.getItem("pomodoro-theme");
    const theme = saved === "light" || saved === "dark"
      ? saved
      : (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    document.documentElement.setAttribute("data-theme", theme);
  })();
</script>
<style>
  :root {
    --bg: #e9e9e7;
    --blue: #4f7089;
    --blue-knob: #9cc2d1;
    --sage: #6f8a6a;
    --sage-knob: #b7cda8;
    --tickc: #2c2c2c;
    --face: #fbfbf9;
    --shadow-outer: rgba(0,0,0,0.15);
    --shadow-inner: rgba(255,255,255,0.55);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1b1c1f;
      --blue: #5d84a1;
      --blue-knob: #86adbe;
      --sage: #7a9673;
      --sage-knob: #9bb790;
      --tickc: #e6e6e3;
      --face: #2a2c31;
      --shadow-outer: rgba(0,0,0,0.4);
      --shadow-inner: rgba(255,255,255,0.06);
    }
  }
  :root[data-theme="light"] {
    --bg: #e9e9e7;
    --blue: #4f7089;
    --blue-knob: #9cc2d1;
    --sage: #6f8a6a;
    --sage-knob: #b7cda8;
    --tickc: #2c2c2c;
    --face: #fbfbf9;
    --shadow-outer: rgba(0,0,0,0.15);
    --shadow-inner: rgba(255,255,255,0.55);
  }
  :root[data-theme="dark"] {
    --bg: #1b1c1f;
    --blue: #5d84a1;
    --blue-knob: #86adbe;
    --sage: #7a9673;
    --sage-knob: #9bb790;
    --tickc: #e6e6e3;
    --face: #2a2c31;
    --shadow-outer: rgba(0,0,0,0.4);
    --shadow-inner: rgba(255,255,255,0.06);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    padding: 40px 24px;
    font-family: "Helvetica Neue", system-ui, sans-serif;
    transition: background 0.3s;
  }
  .case {
    width: min(70vw, 70vh, 460px);
    aspect-ratio: 1 / 1;
    padding: 22px;
    border-radius: 46px;
    background: var(--face);
    box-shadow: 0 10px 24px var(--shadow-outer), inset 0 2px 0 var(--shadow-inner);
    cursor: pointer;
    transition: transform 0.15s, background 0.3s, box-shadow 0.4s, opacity 0.4s;
  }
  .case:hover { transform: scale(1.01); }
  .case:active { transform: scale(0.99); }
  .case.idle {
    opacity: 0.8;
    box-shadow: 0 4px 10px var(--shadow-outer), inset 0 1px 0 var(--shadow-inner);
  }
  .theme-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: none;
    background: var(--face);
    color: var(--tickc);
    font-size: 17px;
    line-height: 1;
    cursor: pointer;
    box-shadow: 0 4px 10px var(--shadow-outer), inset 0 1px 0 var(--shadow-inner);
    transition: background 0.3s, box-shadow 0.3s, transform 0.15s;
  }
  .theme-toggle:hover { transform: scale(1.06); }
  .theme-toggle:active { transform: scale(0.94); }
  .dial-wrap { width: 100%; height: 100%; }
  svg { width: 100%; height: 100%; overflow: visible; }
  .disk { fill: var(--blue); transition: fill 0.4s; }
  .pie-elapsed { fill: var(--face); }
  .hand { stroke: var(--blue-knob); stroke-width: 4; stroke-linecap: round; transition: stroke 0.4s; }
  .knob { fill: var(--blue-knob); transition: fill 0.4s; }
  .tick { stroke: var(--tickc); stroke-width: 1.5; stroke-linecap: round; opacity: 0.55; }
  .tick.major { stroke-width: 2.5; opacity: 0.9; }
  .num {
    font-size: 20px;
    font-weight: 700;
    fill: var(--tickc);
    text-anchor: middle;
    dominant-baseline: central;
    font-family: "Helvetica Neue", system-ui, sans-serif;
  }
</style>
</head>
<body>
<button class="theme-toggle" id="themeToggle" aria-label="Toggle light/dark theme"></button>
<div class="case idle" id="case" role="button" tabindex="0" aria-label="Start or pause">
  <div class="dial-wrap">
    <svg viewBox="0 0 300 300">
      <circle class="disk" id="disk" cx="150" cy="150" r="128"></circle>
      <path class="pie-elapsed" id="pie" d=""></path>
      <g id="ticks"></g>
      <line class="hand" id="hand" x1="150" y1="150" x2="150" y2="30"></line>
      <circle class="knob" id="knob" cx="150" cy="150" r="9"></circle>
    </svg>
  </div>
</div>
<script>
const TEST = new URLSearchParams(location.search).has("test");
const WORK_MIN = 25, BREAK_MIN = 5;
const WORK = TEST ? 5 : WORK_MIN * 60, BREAK = TEST ? 3 : BREAK_MIN * 60;
const CX = 150, CY = 150, R = 128;
let mode = "work", remain = WORK, running = false, rafId = null, lastTime = null;
const $ = id => document.getElementById(id);

function angleForValue(value, totalMin) {
  return ((totalMin - value) / totalMin) * 2 * Math.PI;
}

function renderTicks() {
  const g = $("ticks");
  g.innerHTML = "";
  const ns = "http://www.w3.org/2000/svg";
  const totalMin = mode === "work" ? WORK_MIN : BREAK_MIN;
  const majorStep = mode === "work" ? 5 : 1;
  for (let m = 0; m < totalMin; m++) {
    const a = angleForValue(m, totalMin);
    const isMajor = m % majorStep === 0;
    const r1 = isMajor ? 104 : 112, r2 = 122;
    const line = document.createElementNS(ns, "line");
    line.setAttribute("x1", CX + r1 * Math.sin(a));
    line.setAttribute("y1", CY - r1 * Math.cos(a));
    line.setAttribute("x2", CX + r2 * Math.sin(a));
    line.setAttribute("y2", CY - r2 * Math.cos(a));
    line.setAttribute("class", isMajor ? "tick major" : "tick");
    g.appendChild(line);

    if (isMajor) {
      const rNum = 90;
      const text = document.createElementNS(ns, "text");
      text.setAttribute("x", CX + rNum * Math.sin(a));
      text.setAttribute("y", CY - rNum * Math.cos(a));
      text.setAttribute("class", "num");
      text.textContent = m;
      g.appendChild(text);
    }
  }
}

function piePath(fraction) {
  if (fraction >= 1) {
    return "M " + CX + " " + CY + " m -" + R + " 0 a " + R + " " + R + " 0 1 0 " + (2 * R) + " 0 a " + R + " " + R + " 0 1 0 -" + (2 * R) + " 0";
  }
  if (fraction <= 0) return "";
  const angle = fraction * 2 * Math.PI;
  const x = CX + R * Math.sin(angle);
  const y = CY - R * Math.cos(angle);
  const largeArc = fraction > 0.5 ? 1 : 0;
  return "M " + CX + " " + CY + " L " + CX + " " + (CY - R) +
         " A " + R + " " + R + " 0 " + largeArc + " 1 " + x.toFixed(2) + " " + y.toFixed(2) + " Z";
}

function render() {
  const total = mode === "work" ? WORK : BREAK;
  const elapsed = 1 - remain / total;
  $("pie").setAttribute("d", piePath(elapsed));
  const work = mode === "work";
  $("disk").style.fill = work ? "var(--blue)" : "var(--sage)";
  $("knob").style.fill = work ? "var(--blue-knob)" : "var(--sage-knob)";
  $("hand").style.stroke = work ? "var(--blue-knob)" : "var(--sage-knob)";
  const handAngle = elapsed * 2 * Math.PI;
  const handR1 = 0, handR2 = 34;
  $("hand").setAttribute("x1", CX + handR1 * Math.sin(handAngle));
  $("hand").setAttribute("y1", CY - handR1 * Math.cos(handAngle));
  $("hand").setAttribute("x2", CX + handR2 * Math.sin(handAngle));
  $("hand").setAttribute("y2", CY - handR2 * Math.cos(handAngle));
}

function beep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = "sine";
    o.frequency.value = 740;
    g.gain.setValueAtTime(0.15, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.7);
    o.start(); o.stop(ctx.currentTime + 0.7);
  } catch (e) {}
}

function switchMode() {
  mode = mode === "work" ? "break" : "work";
  remain = mode === "work" ? WORK : BREAK;
  renderTicks();
  render();
}

function loop(now) {
  if (!running) return;
  if (lastTime === null) lastTime = now;
  const dt = (now - lastTime) / 1000;
  lastTime = now;
  remain -= dt;
  if (remain <= 0) { beep(); switchMode(); }
  render();
  rafId = requestAnimationFrame(loop);
}

function toggleRunning() {
  running = !running;
  $("case").classList.toggle("idle", !running);
  if (running) {
    lastTime = null;
    rafId = requestAnimationFrame(loop);
  } else if (rafId) {
    cancelAnimationFrame(rafId);
    rafId = null;
  }
  render();
}

$("case").onclick = toggleRunning;
$("case").onkeydown = (e) => {
  if (e.key === "Enter" || e.key === " ") {
    e.preventDefault();
    toggleRunning();
  }
};

const THEME_KEY = "pomodoro-theme";
function applyThemeIcon() {
  const theme = document.documentElement.getAttribute("data-theme");
  $("themeToggle").textContent = theme === "dark" ? "☀" : "☾";
  document.querySelector('meta[name="theme-color"]').setAttribute(
    "content", theme === "dark" ? "#1b1c1f" : "#e9e9e7"
  );
}
$("themeToggle").onclick = () => {
  const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", next);
  localStorage.setItem(THEME_KEY, next);
  applyThemeIcon();
};

renderTicks();
applyThemeIcon();
render();
</script>
</body>
</html>
