<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Timer</title>
<meta name="description" content="A minimal pomodoro timer. One button, a quiet dial, and a growing grid.">
<meta name="theme-color" content="#e9e9e7">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='42' fill='%23f4f4f2' stroke='%235b7ca4' stroke-width='10'/%3E%3Cpath d='M50 50 L50 8 A42 42 0 0 1 92 50 Z' fill='%23cdd8e4'/%3E%3C/svg%3E">
<style>
  :root {
    --bg: #e9e9e7;
    --blue: #4f7089;
    --blue-knob: #9cc2d1;
    --sage: #6f8a6a;
    --sage-knob: #b7cda8;
    --tickc: #2c2c2c;
    --face: #fbfbf9;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 56px;
    padding: 40px 24px;
    font-family: "Helvetica Neue", system-ui, sans-serif;
  }
  .case {
    width: 320px;
    height: 320px;
    padding: 22px;
    border-radius: 46px;
    background: var(--face);
    box-shadow: 0 10px 24px rgba(0,0,0,0.15), inset 0 2px 0 rgba(255,255,255,0.55);
  }
  .dial-wrap { width: 100%; height: 100%; }
  svg { width: 100%; height: 100%; overflow: visible; }
  .disk { fill: var(--blue); transition: fill 0.4s; }
  .pie-elapsed { fill: var(--face); }
  .hand { stroke: var(--blue-knob); stroke-width: 4; stroke-linecap: round; transition: stroke 0.4s; }
  .knob { fill: var(--blue-knob); transition: fill 0.4s; }
  .tick { stroke: var(--tickc); stroke-width: 1.5; stroke-linecap: round; opacity: 0.55; }
  .tick.major { stroke-width: 2.5; opacity: 0.9; }
  .num {
    font-size: 20px;
    font-weight: 700;
    fill: var(--tickc);
    text-anchor: middle;
    dominant-baseline: central;
    font-family: "Helvetica Neue", system-ui, sans-serif;
  }
  button {
    font-size: 18px;
    line-height: 1;
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: none;
    background: var(--blue);
    color: var(--face);
    cursor: pointer;
    transition: background 0.4s, transform 0.15s;
    padding-left: 4px;
  }
  button:hover { transform: scale(1.05); }
  button:active { transform: scale(0.95); }
  button.rest-color { background: var(--sage); }
  .grass {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 8px;
    width: 300px;
  }
  .cell {
    aspect-ratio: 1;
    border-radius: 50%;
    background: #dcdcd9;
    transition: background 0.3s, transform 0.3s;
  }
  .cell.done { background: var(--blue); }
  .cell.pop { animation: pop 0.4s ease; }
  @keyframes pop {
    0% { transform: scale(0.3); }
    60% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }
</style>
</head>
<body>
<div class="case" id="case">
  <div class="dial-wrap">
    <svg viewBox="0 0 300 300">
      <circle class="disk" id="disk" cx="150" cy="150" r="128"></circle>
      <path class="pie-elapsed" id="pie" d=""></path>
      <g id="ticks"></g>
      <line class="hand" id="hand" x1="150" y1="150" x2="150" y2="30"></line>
      <circle class="knob" id="knob" cx="150" cy="150" r="9"></circle>
    </svg>
  </div>
</div>
<button id="startBtn" aria-label="Start">▶</button>
<div class="grass" id="grass"></div>
<script>
const TEST = new URLSearchParams(location.search).has("test");
const WORK_MIN = 25, BREAK_MIN = 5;
const WORK = TEST ? 5 : WORK_MIN * 60, BREAK = TEST ? 3 : BREAK_MIN * 60;
const CX = 150, CY = 150, R = 128;
let mode = "work", remain = WORK, running = false, timer = null, done = 0;
const $ = id => document.getElementById(id);

function angleForValue(value, totalMin) {
  return ((totalMin - value) / totalMin) * 2 * Math.PI;
}

function renderTicks() {
  const g = $("ticks");
  g.innerHTML = "";
  const ns = "http://www.w3.org/2000/svg";
  const totalMin = mode === "work" ? WORK_MIN : BREAK_MIN;
  const majorStep = mode === "work" ? 5 : 1;
  for (let m = 0; m < totalMin; m++) {
    const a = angleForValue(m, totalMin);
    const isMajor = m % majorStep === 0;
    const r1 = isMajor ? 104 : 112, r2 = 122;
    const line = document.createElementNS(ns, "line");
    line.setAttribute("x1", CX + r1 * Math.sin(a));
    line.setAttribute("y1", CY - r1 * Math.cos(a));
    line.setAttribute("x2", CX + r2 * Math.sin(a));
    line.setAttribute("y2", CY - r2 * Math.cos(a));
    line.setAttribute("class", isMajor ? "tick major" : "tick");
    g.appendChild(line);

    if (isMajor) {
      const rNum = 90;
      const text = document.createElementNS(ns, "text");
      text.setAttribute("x", CX + rNum * Math.sin(a));
      text.setAttribute("y", CY - rNum * Math.cos(a));
      text.setAttribute("class", "num");
      text.textContent = m;
      g.appendChild(text);
    }
  }
}

const GRID = 10;
const KEY = "pomodoro-done";
function initGrass() {
  const g = $("grass");
  if (!TEST) done = parseInt(localStorage.getItem(KEY) || "0", 10) || 0;
  const rows = Math.max(1, Math.ceil(done / GRID));
  for (let i = 0; i < rows * GRID; i++) {
    const c = document.createElement("div");
    c.className = "cell" + (i < done ? " done" : "");
    g.appendChild(c);
  }
}
function addGrass() {
  done++;
  if (!TEST) localStorage.setItem(KEY, String(done));
  const g = $("grass");
  if (done > g.children.length) {
    for (let i = 0; i < GRID; i++) {
      const c = document.createElement("div");
      c.className = "cell";
      g.appendChild(c);
    }
  }
  const cell = g.children[done - 1];
  cell.classList.add("done", "pop");
}

function piePath(fraction) {
  if (fraction >= 1) {
    return "M " + CX + " " + CY + " m -" + R + " 0 a " + R + " " + R + " 0 1 0 " + (2 * R) + " 0 a " + R + " " + R + " 0 1 0 -" + (2 * R) + " 0";
  }
  if (fraction <= 0) return "";
  const angle = fraction * 2 * Math.PI;
  const x = CX + R * Math.sin(angle);
  const y = CY - R * Math.cos(angle);
  const largeArc = fraction > 0.5 ? 1 : 0;
  return "M " + CX + " " + CY + " L " + CX + " " + (CY - R) +
         " A " + R + " " + R + " 0 " + largeArc + " 1 " + x.toFixed(2) + " " + y.toFixed(2) + " Z";
}

function render() {
  const total = mode === "work" ? WORK : BREAK;
  const elapsed = 1 - remain / total;
  $("pie").setAttribute("d", piePath(elapsed));
  const work = mode === "work";
  $("disk").style.fill = work ? "var(--blue)" : "var(--sage)";
  $("knob").style.fill = work ? "var(--blue-knob)" : "var(--sage-knob)";
  $("hand").style.stroke = work ? "var(--blue-knob)" : "var(--sage-knob)";
  const handAngle = elapsed * 2 * Math.PI;
  const handR1 = 0, handR2 = 34;
  $("hand").setAttribute("x1", CX + handR1 * Math.sin(handAngle));
  $("hand").setAttribute("y1", CY - handR1 * Math.cos(handAngle));
  $("hand").setAttribute("x2", CX + handR2 * Math.sin(handAngle));
  $("hand").setAttribute("y2", CY - handR2 * Math.cos(handAngle));
  $("startBtn").textContent = running ? "❚❚" : "▶";
  $("startBtn").classList.toggle("rest-color", !work);
}

function beep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = "sine";
    o.frequency.value = 740;
    g.gain.setValueAtTime(0.15, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.7);
    o.start(); o.stop(ctx.currentTime + 0.7);
  } catch (e) {}
}

function switchMode() {
  if (mode === "work") addGrass();
  mode = mode === "work" ? "break" : "work";
  remain = mode === "work" ? WORK : BREAK;
  renderTicks();
  render();
}

function tick() {
  remain--;
  if (remain <= 0) { beep(); switchMode(); }
  render();
}

$("startBtn").onclick = () => {
  running = !running;
  if (running) timer = setInterval(tick, 1000);
  else { clearInterval(timer); timer = null; }
  render();
};

renderTicks();
initGrass();
render();
</script>
</body>
</html>
